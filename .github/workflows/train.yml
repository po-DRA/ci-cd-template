name: Train model

on:
  push:
    paths:
      - "data/**"
      - "scripts/**"

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0

      - run: pixi install
      - run: pixi run python scripts/train.py

      - uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: model.joblib