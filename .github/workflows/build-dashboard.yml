name: Update dashboard

on:
 push:
   paths:
     - "model/**"
     - "notebooks/**"

jobs:
 dashboard:
   runs-on: ubuntu-latest

   steps:
     - uses: actions/checkout@v4
     - uses: prefix-dev/setup-pixi@v0

     - run: pixi install
     - run: pixi run marimo export html notebooks/dashboard.py -o dashboard.html

     - uses: actions/upload-artifact@v4
       with:
         name: dashboard
         path: dashboard.html
