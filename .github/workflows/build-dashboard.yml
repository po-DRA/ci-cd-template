name: Update dashboard

on:
  push:
    paths:
      - "data/**"
      - "scripts/**"
      - "notebooks/**"

jobs:
  dashboard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          locked: false

      - name: Train model
        run: pixi run train

      - name: Export dashboard to HTML
        run: pixi run marimo export html notebooks/dashboard.py -o dashboard.html

      - uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: dashboard.html
