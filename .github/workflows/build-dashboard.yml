name: Update dashboard

on:
  push:
    paths:
      - "model/model.joblib"
      - "notebooks/**"

jobs:
  dashboard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Install dependencies
        run: pixi install

      - name: Export dashboard to HTML
        run: pixi run marimo export html notebooks/dashboard.py -o dashboard.html

      - uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: dashboard.html
